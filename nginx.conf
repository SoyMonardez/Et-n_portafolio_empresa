server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    client_max_body_size 12M;

    # Compresión para que cargue más rápido
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types
        text/plain text/css application/javascript application/json
        image/svg+xml application/xml font/woff2;

    # Los archivos con hash en el nombre se cachean mucho tiempo
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Backend API (formularios públicos)
    location /api/ {
        proxy_pass http://backend:4000/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    # Archivos subidos (CVs)
    location /uploads/ {
        proxy_pass http://backend:4000/uploads/;
        add_header X-Content-Type-Options "nosniff" always;
    }

    # Rutas de la app (React Router): todo cae en index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # No cachear el index para tomar siempre la última versión
    location = /index.html {
        add_header Cache-Control "no-cache";
    }
}
