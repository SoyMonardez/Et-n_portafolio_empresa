server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Compresión para que cargue más rápido
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types
        text/plain text/css application/javascript application/json
        image/svg+xml application/xml font/woff2;

    # Los archivos con hash en el nombre se cachean mucho tiempo
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Rutas de la app (React Router): todo cae en index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # No cachear el index para tomar siempre la última versión
    location = /index.html {
        add_header Cache-Control "no-cache";
    }
}
