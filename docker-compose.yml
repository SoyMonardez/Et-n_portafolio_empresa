# Despliegue local de Etán.
# Por ahora solo el sitio web (frontend). En las próximas fases se
# agregan los servicios "backend" (Node/Express) y "db" (PostgreSQL).

services:
  web:
    build:
      context: .
      target: produccion
    image: etan-web
    container_name: etan-web
    ports:
      - "8090:80"
    restart: unless-stopped

