# Despliegue local de Etán: frontend (Nginx) + backend (Node) + base (PostgreSQL).

services:
  db:
    image: postgres:16-alpine
    container_name: etan-db
    environment:
      POSTGRES_DB: ${PGDATABASE:-etan}
      POSTGRES_USER: ${PGUSER:-etan}
      POSTGRES_PASSWORD: ${PGPASSWORD:-cambiar_esto}
    volumes:
      - etan_db:/var/lib/postgresql/data
      - ./backend/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PGUSER:-etan}"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  backend:
    build: ./backend
    container_name: etan-backend
    environment:
      PORT: 4000
      NODE_ENV: production
      PGHOST: db
      PGPORT: 5432
      PGUSER: ${PGUSER:-etan}
      PGPASSWORD: ${PGPASSWORD:-cambiar_esto}
      PGDATABASE: ${PGDATABASE:-etan}
      JWT_SECRET: ${JWT_SECRET:-854f600c05280406002514644ae67c4febfadf4bd5d2b174997d04967c86f02d595dd86fb07f47ff17b8636cff62f7fa}
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      GROQ_MODEL: ${GROQ_MODEL:-llama-3.3-70b-versatile}
    volumes:
      - etan_uploads:/app/uploads
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  web:
    build:
      context: .
      target: produccion
    image: etan-web
    container_name: etan-web
    ports:
      - "8090:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  etan_db:
  etan_uploads:
